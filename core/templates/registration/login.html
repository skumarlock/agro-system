{% extends "base.html" %}

{% block title %}Login | Agro System{% endblock %}

{% block content %}

{% load static %}
<script src="{% static 'js/theme.js' %}"></script>

<div class="row justify-content-center">
    <div class="d-flex justify-content-end mb-3">
        <button type="button" onclick="toggleTheme()" class="btn btn-sm border-0">
            <img id="theme-icon" src="{% static 'icons/icons8-dark-mode-100.png' %}" width="18">
        </button>
    </div>
    <div class="col-md-6 col-lg-4">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-3 text-center">Login</h1>
                <form method="post">
                    {% csrf_token %}
                    {{ form.non_field_errors }}
                    <div class="mb-3">
                        <label for="{{ form.username.id_for_label }}" class="form-label">Username</label>
                        <input type="text" name="{{ form.username.html_name }}" id="{{ form.username.id_for_label }}"
                            class="form-control" value="{{ form.username.value|default_if_none:'' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.password.id_for_label }}" class="form-label">Password</label>
                        <input type="password" name="{{ form.password.html_name }}"
                            id="{{ form.password.id_for_label }}" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Sign in</button>
                    {% if next %}
                    <input type="hidden" name="next" value="{{ next }}">
                    {% endif %}
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
