{% extends "base.html" %}

{% block title %}Agronomist Dashboard{% endblock %}

{% block content %}

<div class="mb-4">
    <h1 class="h3 mb-1">My Clients</h1>
    <p class="text-muted">Farms you are consulting</p>
</div>

<div class="card shadow-sm border-0">
    <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
            <thead>
                <tr>
                    <th>Owner</th>
                    <th>Fields</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                {% for link in links %}
                <tr>
                    <td>{{ link.owner.username }}</td>
                    <td>{{ link.owner.fields.count }}</td>
                    <td class="text-end">
                        <a href="{% url 'agronomist-owner-detail' link.owner.id %}"
                            class="btn btn-sm btn-outline-success">
                            View
                        </a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center text-muted py-4">
                        No clients yet
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
